    <script>
      // Gracefully prevent global scope collisions and TypeErrors when
      // environment tools, sandboxes, or extensions try to override window.fetch
      (function () {
        try {
          var originalFetch = window.fetch;
          var currentFetch = originalFetch;
          Object.defineProperty(window, "fetch", {
            get: function () {
              return currentFetch;
            },
            set: function (val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true,
          });
        } catch (e) {
          console.warn("Could not patch fetch descriptor:", e);
        }
      })();
    </script>
